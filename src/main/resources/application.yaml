spring:
  application:
    name: datafirewall
    version: ${APP_VERSION:0.0.1}
    projectName: mkad

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ignaite_local_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:kampus}
    driverClassName: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: TargetDBPool

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        default_schema: datafirewall
  
  kafka:
    cache-update:
        enabled: true # toggle kafka service
    topics:
      cache-update: cache.update.topic

    bootstrap-servers: your-kafka:9093

    properties:
      security.protocol: SSL

      ssl.truststore.location: /opt/certs/truststore.jks
      ssl.truststore.password: changeit

      ssl.keystore.location: /opt/certs/keystore.jks
      ssl.keystore.password: changeit
      ssl.key.password: changeit

  flyway:
    schemas: datafirewall
    enabled: true
    locations: classpath:db/migration
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ignaite_local_db?currentSchema=datafirewall}
    user: ${DB_USER:postgres}
    password: ${DB_PASSWORD:kampus}


  tomcat:
    max-connections: 100 # Максимальное количество соединений
    accept-count: 100 # Максимальное количество потоков
    threads:
      max: 50 # Размер очереди запросов

ignite:
  thin:
    addresses: 10.10.1.11:10800,10.10.1.12:10800
    connect-timeout-ms: 5000
    ssl-enabled: false
    username: ignite
    password: ignite

  ssl:
    key-store-path: /opt/ignite/ssl/client.jks
    trust-store-path: /opt/ignite/ssl/trust.jks
    key-store-password: changeit
    trust-store-password: changeit

logs-database:
  enabled: true
  task-create-partition: 0 0 0 * * ?
  url: jdbc:postgresql://localhost:5432/log_db
  username: postgres
  password: kampus
  driverClassName: org.postgresql.Driver
  table: "audit.datafirewall_log"

clean-database-logs:
  # cron expression, to switch off put value '-'
  task-cleaner-schedule: 0 0 * * * ?
  # delete logs from db that older than X days
  clean-period: 1080

datafirewall:
  generated-rules:
    enabled: true
    output-dir: ./generated-rules

sync:
  enabled: true
  interval: 60000
  timeout-ms: 300000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  cef:
    path: logs
    fileName: cef.log
    retention-days: 90
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.engine.jdbc.connections.internal.DriverManagerConnectionProviderImpl: DEBUG
    org.apache.flink: INFO
    org.springframework.jdbc: WARN
    com.gpb.replication.postgres: DEBUG
    org.flywaydb: DEBUG
  file:
    name: logs/datafirewall.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 7
